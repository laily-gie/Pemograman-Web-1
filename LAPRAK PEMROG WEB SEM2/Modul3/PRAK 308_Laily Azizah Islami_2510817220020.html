<html>
<head>
    <title>Pendaftaran Kursus</title>
</head>
<body font face="sans-serif">

    <table border="1" width="550" cellspacing="0" cellpadding="12" align="center">
        
        <tr bgcolor="skyblue">
            <td colspan="10" align="center" height="100" valign="top">
                <font face="arial" color="red" size="6"><b>Pendaftaran Kursus</b></font>
            </td>
        </tr>

        <tr bgcolor="gray">
            <td colspan="5" style="padding: 10px;" valign="top">
                <font face="arial black" size="5"><b>Data Diri</b></font>
                <br><br>
                
                <table border="0" width="100%">
                    <tr>
                        <td width="150">Nama</td>
                        <td><input type="text" size="30"></td>
                    </tr>

                    <tr>
                        <td>Nim</td>
                        <td><input type="text" size="30"></td>
                    </tr>

                    <tr>
                        <td>E-mail</td>
                        <td><input type="text" size="30"></td>
                    </tr>

                    <tr>
                        <td>Tanggal Lahir</td>
                        <td><input type="text" placeholder="hh/bb/tttt" size="15" style="font-family: Courier New"></td>
                    <tr>
                        <td valign="top">Jenis Kelamin</td>
                        <td>
                            <input type="radio" name="jenis_kelamin" style="accent-color: blue;"> Laki-laki <br>
                            <input type="radio" name="jenis_kelamin" style="accent-color: blue;"> Perempuan
                        </td>
                    </tr>
                    </tr>

                    <tr>
                        <td valign="top">Pilih Program Kursus</td>
                        <td>
                            <input type="checkbox" style="accent-color: blue;"> C# <br>
                            <input type="checkbox" style="accent-color: blue;"> Java <br>
                            <input type="checkbox" style="accent-color: blue;"> SQL <br>
                            <input type="checkbox" style="accent-color: blue;"> HTML dan PHP
                        </td>
                    </tr>

                    <tr>
                        <td>Pilihan Hari/Jam Kursus</td>
                        <td>
                            <select>
                                <option >Senin - Rabu/09.00 - 11.00</option>
                                <option>Kamis - Jumat/8.00 - 11.30</option>
                                <option>Sabtu - Minggu/10.00 - 12.00</option>
                            </select>
                        </td>
                    </tr>
                     
                </table>
                <br>
            </td>
        </tr>

        <tr bgcolor="salmon">
            <td colspan="2" style="padding: 10px;">
                Komentar Anda <br>
                <textarea rows="5" style="width: 80%;"></textarea>
                <br><br>
                <input type="reset" value="Reset">
                <input type="submit" value="Submit">
                <input type="button" value="Cancel">
                <br><br>
            </td>
        </tr>
    </table>

</body>
</html>
